<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumblehead</title>
</head>
<body>
    <!-- Hero Section -->
    <section class="section-hero-a" style="height: 100vh; background: #f0f0f0;">
        <h1 style="margin: 0; padding: 20px;">Hero Section</h1>
    </section>

    <!-- Navbar -->
    <div data-animation="over-right" data-collapse="small" data-duration="600" data-easing="ease-in-out-quint"
        data-easing2="ease-in-out-quint" role="banner" class="navbar w-nav">
        <div class="block-navbar">
            <div class="nav">
                <a href="/" aria-current="page" class="brand w-nav-brand w--current" aria-label="home">
                    <img src="https://cdn.prod.website-files.com/678924f42779e3937165a9c9/678f6e47f47f5d5e2b1502c2_tumblehead%20(2).svg"
                        loading="eager" alt="" class="logo">
                </a>
            </div>
            <div class="nav">
                <div class="menu-button w-nav-button" style="-webkit-user-select: text;" aria-label="menu" role="button"
                    tabindex="0" aria-controls="w-nav-overlay-0" aria-haspopup="menu" aria-expanded="false">
                    <div class="block-icon-menu">
                        <img src="https://cdn.prod.website-files.com/678924f42779e3937165a9c9/678924f42779e3937165aa62_menu.svg"
                            loading="eager" alt="" class="icon-menu">
                    </div>
                </div>
                <nav role="navigation" class="nav-menu w-nav-menu">
                    <a href="#" class="nav-link w-nav-link">Work<br></a>
                    <a href="#" class="nav-link w-nav-link">About<br></a>
                    <a href="#" class="nav-link w-nav-link">Blog<br></a>
                    <a href="#" class="nav-link w-nav-link">Contact<br></a>
                </nav>
            </div>
        </div>
        <div class="w-nav-overlay" data-wf-ignore="" id="w-nav-overlay-0"></div>
    </div>

    <!-- Content after hero -->
    <div style="height: 200vh; padding: 20px;">
        <h2>Scroll down to see navbar animation</h2>
        <p>Content after hero section...</p>
    </div>

    <script type="module" src="/src/js/main.js"></script>
</body>
</html>
